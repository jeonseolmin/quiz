<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MemberList</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgb(34 34 34), rgb(74 74 74))
        }
    </style>
</head>
<body class="gradient-custom">
<nav class="navbar navbar-expand-lg bg-dark" style="background-color: black" data-bs-theme="light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/" style="color: white">Home</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

            <!-- 왼쪽 메뉴 -->
            <div class="navbar-nav">

                <a class="nav-link"
                   href="/member/my-page"
                   style="color: white">
                    MyPage
                </a>

                <a class="nav-link"
                   href="/admin/member-list"
                   style="color: white">
                    Setting
                </a>
                <a class="nav-link"
                   href="/member/logout"
                   style="color: white">
                    Logout
                </a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-dark text-white">
            회원 관리
        </div>

        <div class="card-body">
            <table class="table table-hover text-center">
                <thead class="thead-dark">
                <tr>
                    <th>아이디</th>
                    <th>권한</th>
                    <th>상태</th>
                    <th>정답</th>
                    <th>오답</th>
                    <th>승인 변경</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="member : ${memberList}">
                    <td th:text="${member.loginId}"></td>
                    <td th:text="${member.role}"></td>
                    <td th:text="${member.status}"></td>
                    <td th:text="${member.answerTrue}"></td>
                    <td th:text="${member.answerFalse}"></td>
                    <td>
                        <form th:action="@{/admin/change-state}" method="post" class="mb-0">
                            <input type="hidden" name="loginId" th:value="${member.loginId}">

                            <select name="status" class="form-control mb-2">
                                <option value="PENDING">대기</option>
                                <option value="APPROVED">승인</option>
                            </select>

                            <button type="submit" class="btn btn-primary btn-sm">변경</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
