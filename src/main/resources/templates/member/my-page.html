<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
</head>
<style>
    .gradient-custom {
        background: linear-gradient(to right, rgba(254, 238, 229, 1), rgba(229, 193, 197, 1))
    }
</style>

<body class="gradient-custom">
<section class="d-flex vh-100">
    <div class="container-fluid row justify-content-center align-content-center">
        <div class="card bg-dark" style="border-radius: 1rem;">
            <div class="card-body p-5 text-center">
                <h2 class="text-white">my-page</h2>
                <p class="text-white-50 mt-2 mb-5">나의 정보</p>
                <div class = "mb-2">
                    <form action="/member/password" method="POST" th:object = "${dto}">
                        <div class="mb-3">
                            <label class="form-label text-white">나의 계정 : <span th:text = "*{loginId}"></span></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">비밀 번호 수정하기</label>
                            <div class="d-flex">
                                <input type="password" class="form-control w-75 mr-2" name="password">
                                <button type="submit" class="btn btn-primary">수정</button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">승인 상태 : <span th:text = "*{status}"></span></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">맞춘 개수 : <span th:text = "*{answerTrue}"></span></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">틀린 개수 :<span th:text = "*{answerFalse}"></span></label>
                        </div>
                        <button type="button" class="btn btn-secondary mt-3" onclick="location.href='/quiz/play'">PLAY</button>
                        <button type="button" class="btn btn-secondary mt-3" onclick="location.href='/member/logout'">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
<script th:if="${message}">
    alert('[[${message}]]');
</script>
</html>
