<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 퀴즈 관리 화면</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgb(34 34 34), rgb(74 74 74))
        }
    </style>
</head>
<body class="gradient-custom">
<nav class="navbar navbar-expand-lg bg-dark" style="background-color: black" data-bs-theme="light">>
    <div class="container-fluid">
        <a class="navbar-brand" href="quiz/play" style="color: white">PLAY</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <!-- 왼쪽 메뉴 -->
            <a class="nav-link"
               href="/member/my-page"
               style="color: white">
                MyPage
            </a>
            <a class="nav-link"
               href="/member/logout"
               style="color: white">
                Logout
            </a>
        </div>
    </div>
</nav>
<div class="container-fluid row justify-content-center align-content-center">
    <div class="card bg-white mt-5" style="border-radius: 1rem;">
        <div class="card-body p-5 text-center">
            <div class = "mb-2">
                <form>
                    <div class="mb-4 text-center">
                        <label class="form-label
                      text-dark
                      font-weight-bold"
                               style="font-size: 32px;">
                            <span th:text="${result}"></span>
                        </label>
                    </div>
                    <div class="mb-4 text-center d-flex justify-content-center align-items-center">
                        <button type="button" class="btn btn-secondary mt-3 mr-5" style="background-color: blue" onclick="location.href='/quiz/play'">다시 문제 풀기</button>
                        <button type="button" class="btn btn-secondary mt-3 " style="background-color: red" onclick="location.href='/member/my-page'">그만 하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>

</html>
