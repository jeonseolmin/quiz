<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OX QUIZ PLAY</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
   <link rel="stylesheet" th:href="@{/css/play.css}">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgb(34 34 34), rgb(74 74 74))
        }
    </style>
    <script>
        function submitAnswer(answer) {
            document.getElementById("selectedAnswer").value = answer;
            document.querySelector("form").submit();
        }
    </script>
</head>
<body class="gradient-custom">
<nav class="navbar navbar-expand-lg bg-dark" style="background-color: black" data-bs-theme="light">>
    <div class="container-fluid">
        <a class="navbar-brand" href="quiz/play" style="color: white">PLAY</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <!-- 왼쪽 메뉴 -->
                <a class="nav-link"
                   href="/member/my-page"
                   style="color: white">
                    MyPage
                </a>
                <a class="nav-link"
                   href="/member/logout"
                   style="color: white">
                    Logout
                </a>
            </div>
        </div>
</nav>
<div class="container-fluid row justify-content-center align-content-center">
    <div class="card bg-white mt-5" style="border-radius: 1rem;">
        <div class="card-body p-5 text-center">
            <div class = "mb-2">
                <form action="/quiz/check" method="POST" th:object="${randomQuiz}">
                    <input type="hidden" name="quizId" th:value="*{id}">
                    <input type="hidden" name="selectedAnswer" id="selectedAnswer">
                    <div class="mb-4 text-center">
                        <label class="form-label
                      text-dark
                      font-weight-bold"
                               style="font-size: 32px;">
                            <span th:text="*{content}"></span>
                        </label>
                    </div>

                    <!-- OX 이미지 -->
                    <div class="mb-3 d-flex justify-content-center align-items-center">

                        <img src="/images/O.png"
                             class="rounded"
                             alt="O"
                             width="120"
                             height="120"
                             onclick="submitAnswer(true)"
                             style="cursor:pointer; margin-right: 50px">

                        <img src="/images/X.png"
                             class="rounded"
                             alt="X"
                             width="120"
                             height="120"
                             onclick="submitAnswer(false)"
                             style="cursor:pointer; margin-left: 50px;">

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>

</html>
