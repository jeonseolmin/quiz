<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 퀴즈 관리 화면</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgb(255 255 255), rgb(251 240 240))
        }
    </style>
</head>
<body class="gradient-custom">
<nav class="navbar navbar-expand-lg bg-dark" style="background-color: black" data-bs-theme="light">>
    <div class="container-fluid">
        <a class="navbar-brand" href="/" style="color: white">Home</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

            <!-- 왼쪽 메뉴 -->
            <div class="navbar-nav">

                <a class="nav-link"
                   href="/member/my-page"
                   style="color: white">
                    MyPage
                </a>

                <a class="nav-link"
                   href="/admin/member-list"
                   style="color: white">
                    Setting
                </a>

                <a class="nav-link"
                   href="/member/logout"
                   style="color: white">
                    Logout
                </a>

            </div>

            <!-- 오른쪽 버튼 -->
            <div class="ml-auto d-flex align-items-center">
                <button class="btn btn-primary mr-2" data-toggle="modal" data-target="#quizInsertModal">
                    문제 추가
                </button>
            </div>

        </div>
    </div>
</nav>
<!--문제 추가-->
<div class="modal fade" id="quizInsertModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/quiz/insert}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">문제 추가</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>문제</label>
                        <textarea name="content" class="form-control"></textarea>
                    </div>

                    <div class="form-group">
                        <label>정답</label>
                        <select name="answer" class="form-control">
                            <option value="true">O</option>
                            <option value="false">X</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>작성자</label>
                        <input type="text" name="writer" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">등록</button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">닫기</button>
                </div>

            </form>
        </div>
    </div>
</div>
<!--문제 수정-->
<div class="modal fade" id="quizUpdateModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/quiz/update}" method="post">

                <input type="hidden" name="id" id="updateId">

                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">
                        퀴즈 수정
                    </h5>

                    <button type="button"
                            class="close text-white"
                            data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">

                    <!-- 문제 -->
                    <div class="form-group">

                        <label class="font-weight-bold">
                            문제
                        </label>

                        <textarea name="content"
                                  id="updateContent"
                                  class="form-control"
                                  rows="4"
                                  placeholder="문제를 입력하세요">
            </textarea>

                    </div>

                    <!-- 정답 -->
                    <div class="form-group">

                        <label class="font-weight-bold">
                            정답
                        </label>

                        <select name="answer"
                                id="updateAnswer"
                                class="form-control">

                            <option value="true">
                                O
                            </option>

                            <option value="false">
                                X
                            </option>

                        </select>

                    </div>

                    <!-- 작성자 -->
                    <div class="form-group">

                        <label class="font-weight-bold">
                            작성자
                        </label>

                        <input type="text"
                               name="writer"
                               id="updateWriter"
                               class="form-control"
                               >

                    </div>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-dismiss="modal">
                        닫기
                    </button>

                    <button type="submit"
                            class="btn btn-primary">
                        수정 완료
                    </button>

                </div>

            </form>
        </div>
    </div>
</div>
<div class ="container py-4">
    <div class="row">
        <div class="col-md-4 mb-3" th:each="quiz : ${quizList}">
            <div class="card ">
                <div class="card-body">
                    <h5 th:text="${quiz.content}"></h5>
                    <div class = "d-flex align-items-center justify-content-between">
                        <p th:text="${quiz.writer}"></p>
                        <div class="d-flex align-items-center mt-5">
                            <button class="btn btn-primary mr-2"
                                    data-toggle="modal"
                                    data-target="#quizUpdateModal"
                                    th:data-id="${quiz.id}"
                                    th:data-content="${quiz.content}"
                                    th:data-answer="${quiz.answer}">문제 수정</button>
                            <form th:action="@{/quiz/delete}"
                                  method="post"
                                  class="mb-0">
                                <input type="hidden"
                                       name="id"
                                       th:value="${quiz.id}">
                                <button type="submit"
                                        class="btn btn-danger"
                                        onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script>
    $('#quizUpdateModal').on('show.bs.modal', function (event) {
        const button = $(event.relatedTarget);
        $('#updateId').val(button.data('id'));
        $('#updateContent').val(button.data('content'));
        $('#updateAnswer').val(String(button.data('answer')));
        $('#updateWriter').val(button.data('writer'));
    });
</script>
</html>
